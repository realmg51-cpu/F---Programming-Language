name: 🧪 .NET Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Compiler/**'
      - 'Test/**'
      - '*.csproj'
  pull_request:
    branches: [ main ]
    paths:
      - 'Compiler/**'
      - 'Test/**'
      - '*.csproj'
  schedule:
    - cron: '0 0 * * *'  # Chạy tự động mỗi ngày lúc 00:00 UTC
  workflow_dispatch:  # Cho phép chạy tay

jobs:
  test:
    name: 🧪 Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: [8.0.x]
      fail-fast: false  # Chạy hết các OS kể cả có fail
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      
      - name: 📦 Restore dependencies
        run: dotnet restore
      
      - name: 🏗️ Build (không cần cho test thuần)
        run: dotnet build --configuration Release --no-restore
      
      - name: 🧪 Run tests
        id: test
        continue-on-error: true  # Cho phép test fail nhưng vẫn chạy tiếp các bước sau
        run: |
          dotnet test Test/tests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      
      - name: 📊 Upload test results
        if: always()  # Luôn chạy kể cả test fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults
          retention-days: 30
      
      - name: 📈 Upload coverage to Codecov
        if: steps.test.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          flags: unittests
          name: fminus-coverage
          fail_ci_if_error: false
      
      - name: 📊 Generate test report
        if: always()
        run: |
          echo "## 📊 Test Results for ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Total | Passed | Failed | Skipped |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ steps.test.outcome }} | ... | ... | ... | ... |" >> $GITHUB_STEP_SUMMARY
      
      - name: ❌ Notify if tests fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Tests failed** on ${{ matrix.os }}! Please check the logs.'
            })
