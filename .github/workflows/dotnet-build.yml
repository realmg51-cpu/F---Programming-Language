name: 🔨 .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: 🔍 DEBUG - List files
      run: |
        echo "=== Current directory: $(pwd) ==="
        echo "=== All files ==="
        ls -la
        echo "=== Compiler directory ==="
        ls -la Compiler/ || echo "No Compiler directory"
        echo "=== Test directory ==="
        ls -la Test/ || echo "No Test directory"
    
    - name: 📦 Restore Compiler
      run: dotnet restore Compiler/compiler.csproj
    
    - name: 🏗️ Build Compiler
      run: dotnet build Compiler/compiler.csproj -c Release --no-restore
    
    - name: 📦 Restore Tests
      run: dotnet restore Test/tests.csproj
    
    - name: 🏗️ Build Tests
      run: dotnet build Test/tests.csproj -c Release --no-restore
    
    - name: ✅ Build success
      run: echo "✅ Build thành công trên ${{ matrix.os }}!"
