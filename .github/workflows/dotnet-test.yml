name: 🧪 .NET Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: 📦 Restore dependencies
      run: dotnet restore
    
    - name: 🏗️ Build Compiler
      run: dotnet build Compiler/compiler.csproj -c Release
    
    - name: 🏗️ Build Tests
      run: dotnet build Test/tests.csproj -c Release
    
    - name: 🔍 Find test assemblies
      id: find-tests
      shell: bash
      run: |
        if [ -d "Test/bin/Release/net8.0" ]; then
          echo "✅ Test directory found"
          ls -la Test/bin/Release/net8.0/
          echo "has_tests=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Test directory not found"
          echo "has_tests=false" >> $GITHUB_OUTPUT
        fi
    
    - name: 🧪 Run Tests
      if: steps.find-tests.outputs.has_tests == 'true'
      continue-on-error: true
      run: |
        dotnet test Test/tests.csproj \
          -c Release \
          --no-build \
          --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory "${{ github.workspace }}/TestResults"
    
    - name: 📊 Check test results
      id: check-results
      shell: bash
      run: |
        if [ -d "${{ github.workspace }}/TestResults" ] && [ "$(ls -A ${{ github.workspace }}/TestResults)" ]; then
          echo "✅ Test results found"
          echo "has_results=true" >> $GITHUB_OUTPUT
          ls -la ${{ github.workspace }}/TestResults/
        else
          echo "⚠️ No test results found"
          echo "has_results=false" >> $GITHUB_OUTPUT
        fi
    
    - name: 📤 Upload test results
      if: steps.check-results.outputs.has_results == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}
        path: ${{ github.workspace }}/TestResults/
        retention-days: 30
        if-no-files-found: ignore
    
    - name: ✅ Final status
      run: |
        echo "✅ Test workflow completed on ${{ matrix.os }}"
