name: 📦 Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'F-- Official NuGet Package Version'
        required: true
        default: '1.0.0'
      notes:
        description: 'Release Notes'
        required: false
        default: ''

jobs:
  publish:
    name: 🚀 Publish F-- v${{ github.event.inputs.version || github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Cần để tạo release
      packages: write  # Cần để push lên GitHub Packages
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Lấy full history cho version info
      
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            7.0.x
      
      - name: 🔢 Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "TAG=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          fi
      
      - name: 📦 Restore with cache
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      - name: 📦 Restore dependencies
        run: dotnet restore
      
      - name: 🏗️ Build
        run: dotnet build Compiler/compiler.csproj -c Release --no-restore
      
      - name: 🧪 Test
        run: dotnet test Test/tests.csproj -c Release --no-build --verbosity minimal
      
      - name: 📦 Pack NuGet
        run: |
          dotnet pack Compiler/compiler.csproj \
            -c Release \
            --no-build \
            -o nupkg \
            -p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            -p:PackageReleaseNotes="${{ github.event.inputs.notes }}"
      
      - name: 📤 Push to NuGet.org
        if: ${{ secrets.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
      
      - name: 📤 Push to GitHub Packages
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
      
      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: F-- v${{ steps.version.outputs.VERSION }}
          body: |
            ## 📦 F-- v${{ steps.version.outputs.VERSION }}
            
            ${{ github.event.inputs.notes || 'Auto-generated release' }}
            
            ### 🚀 Installation
            ```bash
            dotnet add package FSharpMinus --version ${{ steps.version.outputs.VERSION }}
