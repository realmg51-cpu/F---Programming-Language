name: 📊 Code Coverage
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  codecov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      
      - name: 📦 Restore
        run: dotnet restore Compiler/compiler.csproj
      
      - name: 🏗️ Build
        run: dotnet build Compiler/compiler.csproj -c Release
      
      - name: 🧪 Test with coverage
        run: |
          dotnet test Compiler/compiler.csproj \
            -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings .runsettings \
            --logger "trx;LogFileName=test_results.trx"
      
      - name: 🔍 Find coverage files
        run: find ./TestResults -name "*.cobertura.xml" -ls
      
      - name: ☁️ Upload to Codecov
        uses: codecov/codecov-action@v5  # Nên dùng v5 mới nhất
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./TestResults/**/coverage.cobertura.xml
          flags: unittests
          name: F-- Code Coverage
          fail_ci_if_error: true
          verbose: true
