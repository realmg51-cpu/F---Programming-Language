name: 📊 Code Coverage
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  codecov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      
      - name: 📦 Restore
        run: dotnet restore Compiler/compiler.csproj
      
      - name: 🏗️ Build
        run: dotnet build Compiler/compiler.csproj -c Release
      
      # 👇 THÊM BƯỚC NÀY VÀO
      - name: 🧪 Run tests with coverage
        run: |
          dotnet test Compiler/compiler.csproj \
            -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings .runsettings
      
      # 👇 KIỂM TRA FILE ĐÃ ĐƯỢC TẠO CHƯA
      - name: 🔍 Verify coverage files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== TestResults content ==="
          ls -la ./TestResults/ || echo "No TestResults yet"
          echo "=== Looking for coverage files ==="
          find . -name "*.cobertura.xml" -o -name "*.xml" | while read file; do
            echo "Found: $file"
            ls -la "$file"
          done
      
      - name: ☁️ Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false  # Tạm thời false để không fail workflow
          verbose: true
